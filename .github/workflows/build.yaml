name: Build Caddy (x86_64, arm64)

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yaml'

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get latest Caddy version
        id: get_version
        run: |
          set -euo pipefail
          LATEST_VER=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/caddyserver/caddy/releases/latest \
            | jq -r ".tag_name" | sed 's/^v//')

          if [[ -z "$LATEST_VER" || "$LATEST_VER" == "null" ]]; then
            echo "ERROR: Failed to fetch Caddy version from GitHub API"
            exit 1
          fi
          echo "Found version: $LATEST_VER"
          echo "version=$LATEST_VER" >> $GITHUB_OUTPUT

  build:
    needs: prep
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=raw,value=latest
        type=raw,value=${{ needs.prep.outputs.version }}
        type=raw,value=${{ needs.prep.outputs.version }}-{{date 'YYYYMMDD'}}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        - username: ${{ vars.DHI_USERNAME }}
          password: ${{ secrets.DHI_PAT }}